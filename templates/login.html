<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | GOBA INVEST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, var(--bg-glow), transparent 60%);
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--bg-main);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-main);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--accent-main);
            text-decoration: none;
            font-weight: 500;
        }
        .flash-messages {
            margin-bottom: 1.5rem;
        }
        .flash-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.9rem;
            text-align: center;
        }
        .auth-topbar {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-btn:hover {
            color: var(--accent-main);
        }
    </style>
</head>
<body class="light-mode">
    <div class="auth-topbar">
        <a href="/" class="back-btn" data-i18n="back_btn"><i class="fa-solid fa-arrow-left"></i> Piyasaya Dön</a>
        <div style="display: flex; gap: 1rem;">
            <div class="lang-switch" id="lang-toggle" style="background: var(--card-bg);">
                <i class="fa-solid fa-globe"></i>
                <span id="lang-text">TR</span>
            </div>
            <div class="theme-switch" id="theme-toggle" title="Tema Değiştir" style="background: var(--card-bg);">
                <i class="fa-solid fa-sun"></i>
                <i class="fa-solid fa-moon"></i>
            </div>
        </div>
    </div>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
                    <div class="logo-symbol" style="width: 40px; height: 40px; font-size: 1.1rem; margin: 0;"><i class="fa-solid fa-chart-line"></i></div>
                    <span class="logo-text" style="font-size: 1.5rem; margin: 0;">GOBA<span>INVEST</span></span>
                </a>
                <p id="auth-desc" style="color: var(--text-secondary); margin-top: 0.5rem;">Portföyünüzü yönetmek için giriş yapın</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <input type="hidden" name="_csrf_token" value="{{ g.csrf_token }}">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı / E-posta</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary">Giriş Yap</button>
            </form>
            
            <div class="auth-footer">
                Hesabınız yok mu? <a href="{{ url_for('register') }}">Hemen Kayıt Olun</a>
            </div>
        </div>
    </div>
    <script>
        // Tema Yönetimi
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const icon = themeToggle.querySelector('i');

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            body.className = 'dark-mode';
            icon.className = 'fa-solid fa-sun';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = body.classList.contains('dark-mode');
            body.className = isDark ? 'light-mode' : 'dark-mode';
            icon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });

        // Dil Yönetimi
        const langToggle = document.getElementById('lang-toggle');
        const langText = document.getElementById('lang-text');
        
        const translations = {
            'tr': {
                'back_btn': '<i class="fa-solid fa-arrow-left"></i> Piyasaya Dön',
                'title': 'Portföyünüzü yönetmek için giriş yapın',
                'username': 'Kullanıcı Adı / E-posta',
                'password': 'Şifre',
                'login_btn': 'Giriş Yap',
                'no_account': 'Hesabınız yok mu? <a href="/register">Hemen Kayıt Olun</a>'
            },
            'en': {
                'back_btn': '<i class="fa-solid fa-arrow-left"></i> Back to Market',
                'title': 'Login to manage your portfolio',
                'username': 'Username / Email',
                'password': 'Password',
                'login_btn': 'Login',
                'no_account': 'Don\'t have an account? <a href="/register">Register Now</a>'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tr';
        
        function applyLang(lang) {
            document.documentElement.lang = lang;
            langText.innerText = lang.toUpperCase();
            
            document.querySelector('[data-i18n="back_btn"]').innerHTML = translations[lang]['back_btn'];
            document.getElementById('auth-desc').innerText = translations[lang]['title'];
            document.querySelector('label[for="username"]').innerText = translations[lang]['username'];
            document.querySelector('label[for="password"]').innerText = translations[lang]['password'];
            document.querySelector('button[type="submit"]').innerText = translations[lang]['login_btn'];
            document.querySelector('.auth-footer').innerHTML = translations[lang]['no_account'];
        }

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('lang', currentLang);
            applyLang(currentLang);
        });

        if (currentLang === 'en') applyLang('en');
    </script>
</body>
</html>
